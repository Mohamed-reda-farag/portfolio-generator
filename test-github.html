<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>github.js — Dev Test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #080C0A; --bg2: #0D1410; --bg3: #111A14;
      --accent: #00FF88; --text: #E8F0EB; --text2: #8A9E90; --text3: #4A5E52;
      --border: rgba(0,255,136,0.12); --error: #FF4F4F;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Mono', monospace; font-size: 13px;
      line-height: 1.6; padding: 32px;
      background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    h1 { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800;
         letter-spacing: -0.03em; color: var(--accent); margin-bottom: 8px; }
    .subtitle { color: var(--text3); margin-bottom: 32px; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; }

    .controls {
      display: flex; gap: 12px; align-items: center; margin-bottom: 24px;
    }
    input {
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); padding: 10px 14px; border-radius: 6px;
      font-family: inherit; font-size: 13px; width: 240px;
      outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }
    button {
      background: var(--accent); color: #080C0A;
      border: none; padding: 10px 20px; border-radius: 6px;
      font-family: inherit; font-size: 13px; font-weight: 500;
      cursor: pointer; letter-spacing: 0.06em; text-transform: uppercase;
      transition: opacity 0.2s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.ghost {
      background: transparent; color: var(--text2);
      border: 1px solid var(--border);
    }

    .progress-wrap {
      display: none; margin-bottom: 24px;
    }
    .progress-wrap.visible { display: block; }
    .progress-bar {
      height: 2px; background: var(--bg3); border-radius: 2px; overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-fill {
      height: 100%; background: var(--accent);
      border-radius: 2px; transition: width 0.4s ease;
      box-shadow: 0 0 8px rgba(0,255,136,0.4);
      width: 0%;
    }
    .progress-msg { color: var(--text2); font-size: 12px; }

    .stats-row {
      display: flex; gap: 24px; margin-bottom: 24px;
      padding: 16px; background: var(--bg3);
      border: 1px solid var(--border); border-radius: 8px;
    }
    .stat { text-align: center; }
    .stat-val { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800;
                color: var(--accent); letter-spacing: -0.03em; }
    .stat-lbl { font-size: 11px; color: var(--text3); text-transform: uppercase;
                letter-spacing: 0.08em; margin-top: 2px; }

    .section-title {
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem;
      color: var(--text2); text-transform: uppercase; letter-spacing: 0.1em;
      margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--bg3); }

    .repo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; margin-bottom: 32px; }
    .repo-card {
      background: var(--bg3); border: 1px solid rgba(255,255,255,0.05);
      border-radius: 8px; padding: 16px;
      transition: border-color 0.2s;
    }
    .repo-card:hover { border-color: var(--border); }
    .repo-name { font-weight: 500; color: var(--accent); margin-bottom: 4px; }
    .repo-desc { color: var(--text2); font-size: 12px; margin-bottom: 10px;
                 line-height: 1.5; min-height: 36px; }
    .repo-meta { display: flex; gap: 12px; flex-wrap: wrap; }
    .repo-tag { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 4px; }
    .repo-tag .dot { width: 8px; height: 8px; border-radius: 50%; }
    .score-badge {
      margin-left: auto; font-size: 11px;
      background: rgba(0,255,136,0.08); color: var(--accent);
      padding: 2px 8px; border-radius: 20px; border: 1px solid rgba(0,255,136,0.15);
    }

    .lang-bars { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 32px; }
    .lang-item {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .lang-bar-wrap { width: 32px; height: 80px; background: var(--bg3);
                     border-radius: 4px; overflow: hidden; display: flex;
                     flex-direction: column; justify-content: flex-end; }
    .lang-bar { width: 100%; border-radius: 2px; transition: height 0.6s ease; }
    .lang-name { font-size: 10px; color: var(--text3); text-align: center; }
    .lang-pct { font-size: 10px; color: var(--text2); }

    .json-output {
      background: var(--bg2); border: 1px solid rgba(255,255,255,0.05);
      border-radius: 8px; padding: 16px; overflow: auto;
      max-height: 400px; white-space: pre; font-size: 11px;
      color: var(--text2); line-height: 1.7;
    }
    .json-key   { color: #7DD3FC; }
    .json-str   { color: #86EFAC; }
    .json-num   { color: #FCA5A5; }
    .json-bool  { color: #C084FC; }
    .json-null  { color: var(--text3); }

    .error-box {
      display: none; background: rgba(255,79,79,0.06);
      border: 1px solid rgba(255,79,79,0.2); border-radius: 8px;
      padding: 16px; color: var(--error); margin-bottom: 24px;
    }
    .error-box.visible { display: block; }
    .error-code { font-size: 11px; color: rgba(255,79,79,0.5); margin-top: 6px; }

    .hidden { display: none !important; }

    /* Language dot colors */
    .lang-dot-JavaScript { background: #F7DF1E; }
    .lang-dot-TypeScript { background: #3178C6; }
    .lang-dot-Python     { background: #3572A5; }
    .lang-dot-Go         { background: #00ADD8; }
    .lang-dot-Rust       { background: #DEA584; }
    .lang-dot-Java       { background: #B07219; }
    .lang-dot-C\+\+      { background: #F34B7D; }
    .lang-dot-C          { background: #555555; }
    .lang-dot-Ruby       { background: #701516; }
    .lang-dot-PHP        { background: #4F5D95; }
    .lang-dot-Swift      { background: #F05138; }
    .lang-dot-Kotlin     { background: #A97BFF; }
    .lang-dot-Shell      { background: #89E051; }
    .lang-dot-HTML       { background: #E34C26; }
    .lang-dot-CSS        { background: #563D7C; }
    .lang-dot-default    { background: var(--text3); }
  </style>
</head>
<body>

  <h1>github.js — Live Test</h1>
  <p class="subtitle">Step 2 · GitHub API Integration · Portfolio Generator</p>

  <div class="controls">
    <input type="text" id="username-input" placeholder="github username" value="torvalds" />
    <button id="btn-fetch">Fetch Data</button>
    <button class="ghost" id="btn-rate">Check Rate Limit</button>
    <button class="ghost" id="btn-clear">Clear</button>
  </div>

  <!-- Progress -->
  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="progress-msg" id="progress-msg">Starting…</div>
  </div>

  <!-- Error -->
  <div class="error-box" id="error-box">
    <div id="error-msg"></div>
    <div class="error-code" id="error-code"></div>
  </div>

  <!-- Results -->
  <div id="results" class="hidden">

    <!-- User stats -->
    <div class="section-title">Profile</div>
    <div class="stats-row" id="stats-row"></div>

    <!-- Language chart -->
    <div class="section-title">Language Breakdown</div>
    <div class="lang-bars" id="lang-bars"></div>

    <!-- Top repos -->
    <div class="section-title">Top Repos (sorted by priority score)</div>
    <div class="repo-grid" id="repo-grid"></div>

    <!-- Raw JSON -->
    <div class="section-title">Raw Output (for AI prompt)</div>
    <div class="json-output" id="json-output"></div>
  </div>

  <script src="github.js"></script>
  <script>
    const $ = id => document.getElementById(id);

    /* ── Progress UI ─────────────────────────────────────── */
    function setProgress(pct, msg) {
      $('progress-fill').style.width = pct + '%';
      $('progress-msg').textContent  = msg;
    }

    /* ── Error UI ────────────────────────────────────────── */
    function showError(err) {
      $('error-msg').textContent  = err.message || String(err);
      $('error-code').textContent = err.code ? `Error code: ${err.code}` : '';
      $('error-box').classList.add('visible');
    }

    function clearError() {
      $('error-box').classList.remove('visible');
    }

    /* ── Language dot color ──────────────────────────────── */
    const LANG_COLORS = {
      JavaScript: '#F7DF1E', TypeScript: '#3178C6', Python: '#3572A5',
      Go: '#00ADD8', Rust: '#DEA584', Java: '#B07219', 'C++': '#F34B7D',
      C: '#555555', Ruby: '#701516', PHP: '#4F5D95', Swift: '#F05138',
      Kotlin: '#A97BFF', Shell: '#89E051', HTML: '#E34C26', CSS: '#563D7C',
      Dart: '#00B4AB', Elixir: '#6E4A7E', Haskell: '#5E5086', Scala: '#C22D40',
      'C#': '#178600', R: '#198CE7', Lua: '#000080', Vue: '#41B883',
      Dockerfile: '#384D54', YAML: '#CB171E', Jupyter: '#DA5B0B',
    };

    function getLangColor(lang) {
      return LANG_COLORS[lang] || '#4A5E52';
    }

    /* ── Render Results ──────────────────────────────────── */
    function renderResults(data) {
      const { user, top_repos, languages, total_stars, total_repos } = data;

      // Stats row
      $('stats-row').innerHTML = `
        <div class="stat">
          <div class="stat-val">${user.name?.split(' ')[0] || user.login}</div>
          <div class="stat-lbl">Name</div>
        </div>
        <div class="stat">
          <div class="stat-val">${total_repos}</div>
          <div class="stat-lbl">Public Repos</div>
        </div>
        <div class="stat">
          <div class="stat-val">${total_stars > 999 ? (total_stars/1000).toFixed(1)+'K' : total_stars}</div>
          <div class="stat-lbl">Total Stars</div>
        </div>
        <div class="stat">
          <div class="stat-val">${user.followers > 999 ? (user.followers/1000).toFixed(1)+'K' : user.followers}</div>
          <div class="stat-lbl">Followers</div>
        </div>
        <div class="stat">
          <div class="stat-val">${languages.length}</div>
          <div class="stat-lbl">Languages</div>
        </div>
        <div class="stat">
          <div class="stat-val">${top_repos.length}</div>
          <div class="stat-lbl">Featured Repos</div>
        </div>
      `;

      // Language bars
      const topLangs = languages.slice(0, 10);
      const maxBytes = topLangs[0]?.bytes || 1;
      $('lang-bars').innerHTML = topLangs.map(l => `
        <div class="lang-item">
          <div class="lang-bar-wrap">
            <div class="lang-bar"
              style="height:${Math.round((l.bytes/maxBytes)*100)}%;
                     background:${getLangColor(l.language)};"></div>
          </div>
          <div class="lang-pct">${l.percentage}%</div>
          <div class="lang-name">${l.language}</div>
        </div>
      `).join('');

      // Repo grid
      $('repo-grid').innerHTML = top_repos.map((r, i) => `
        <div class="repo-card">
          <div class="repo-name">
            #${i+1} &nbsp; ${r.name}
          </div>
          <div class="repo-desc">${r.description || '<span style="opacity:0.3">No description</span>'}</div>
          <div class="repo-meta">
            ${r.language ? `
              <span class="repo-tag">
                <span class="dot" style="background:${getLangColor(r.language)};"></span>
                ${r.language}
              </span>` : ''}
            <span class="repo-tag">⭐ ${r.stars}</span>
            ${r.fork ? '<span class="repo-tag" style="color:#FFB547;">fork</span>' : ''}
            ${r.archived ? '<span class="repo-tag" style="color:var(--error);">archived</span>' : ''}
            ${r.topics.slice(0,2).map(t => `<span class="repo-tag">#${t}</span>`).join('')}
            <span class="score-badge">score: ${r.priority_score}</span>
          </div>
        </div>
      `).join('');

      // JSON output (syntax-highlighted subset for AI)
      const aiPayload = {
        user: {
          login:    user.login,
          name:     user.name,
          bio:      user.bio,
          location: user.location,
          blog:     user.blog,
          followers: user.followers,
          total_stars,
        },
        top_repos: top_repos.map(r => ({
          name:           r.name,
          description:    r.description,
          language:       r.language,
          stars:          r.stars,
          forks:          r.forks,
          topics:         r.topics,
          readme_excerpt: r.readme ? r.readme.slice(0, 200) : null,
          priority_score: r.priority_score,
        })),
        language_summary: languages.slice(0, 8),
      };

      $('json-output').innerHTML = syntaxHighlight(JSON.stringify(aiPayload, null, 2));

      $('results').classList.remove('hidden');
    }

    /* ── Syntax highlight JSON ───────────────────────────── */
    function syntaxHighlight(json) {
      return json
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, match => {
          let cls = 'json-num';
          if (/^"/.test(match)) {
            cls = /:$/.test(match) ? 'json-key' : 'json-str';
          } else if (/true|false/.test(match)) {
            cls = 'json-bool';
          } else if (/null/.test(match)) {
            cls = 'json-null';
          }
          return `<span class="${cls}">${match}</span>`;
        });
    }

    /* ── Main fetch handler ──────────────────────────────── */
    $('btn-fetch').addEventListener('click', async () => {
      const username = $('username-input').value.trim();
      if (!username) return;

      clearError();
      $('results').classList.add('hidden');
      $('progress-wrap').classList.add('visible');
      $('btn-fetch').disabled = true;
      $('btn-fetch').textContent = 'Fetching…';

      try {
        const data = await window.GitHub.fetchGitHubData(username, (pct, msg) => {
          setProgress(pct, msg);
        });

        setProgress(100, 'Done!');
        renderResults(data);

        // Store in sessionStorage (same key as index.html expects)
        sessionStorage.setItem('pg_github_data', JSON.stringify(data));

        console.log('✅ GitHub data:', data);

      } catch (err) {
        showError(err);
        console.error('❌ GitHub fetch error:', err);
      } finally {
        $('progress-wrap').classList.remove('visible');
        $('btn-fetch').disabled = false;
        $('btn-fetch').textContent = 'Fetch Data';
      }
    });

    /* ── Rate limit check ────────────────────────────────── */
    $('btn-rate').addEventListener('click', async () => {
      const rl = await window.GitHub.checkRateLimit();
      if (rl) {
        alert(`Rate limit: ${rl.remaining}/${rl.limit} remaining\nResets: ${rl.reset.toLocaleTimeString()}`);
      } else {
        alert('Could not fetch rate limit info.');
      }
    });

    /* ── Clear ───────────────────────────────────────────── */
    $('btn-clear').addEventListener('click', () => {
      $('results').classList.add('hidden');
      clearError();
      $('progress-fill').style.width = '0%';
    });

    /* ── Enter key support ───────────────────────────────── */
    $('username-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') $('btn-fetch').click();
    });
  </script>
</body>
</html>
