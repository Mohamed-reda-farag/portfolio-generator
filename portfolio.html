  <style>
    /* ══════════════════════════════════════════════════════════════
       PORTFOLIO PUBLIC PAGE
       Uses IDENTICAL CSS variables and structure to edit.html
       so Pro theme CSS files apply correctly.
    ══════════════════════════════════════════════════════════════ */


    /* ── AVATAR ────────────────────────────────────────────────── */
    .hero-avatar-wrap {
      margin-bottom: var(--sp-6);
      opacity: 0;
      transform: scale(0.9);
      transition: opacity 0.6s ease 0.1s, transform 0.6s cubic-bezier(0.16,1,0.3,1) 0.1s;
    }
    .hero-avatar-wrap.revealed { opacity: 1; transform: scale(1); }

    .hero-avatar {
      width: clamp(80px, 12vw, 140px);
      height: clamp(80px, 12vw, 140px);
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--clr-border);
      box-shadow: 0 0 0 4px var(--clr-accent-dim), var(--shadow-md);
      display: none; /* shown via onload */
    }
    .hero-avatar-placeholder {
      width: clamp(80px, 12vw, 140px);
      height: clamp(80px, 12vw, 140px);
      border-radius: 50%;
      background: var(--clr-bg-3);
      border: 2px solid var(--clr-border);
      box-shadow: 0 0 0 4px var(--clr-accent-dim), var(--shadow-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: clamp(24px, 4vw, 48px);
      color: var(--clr-text-3);
    }

    /* ── Loading State ─────────────────────────────────────────── */
    #page-loader {
      position: fixed;
      inset: 0;
      background: var(--clr-bg);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    #page-loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .loader-dot-row { display: flex; gap: 8px; }
    .loader-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--clr-text-3);
      animation: loader-pulse 1.2s ease-in-out infinite;
    }
    .loader-dot:nth-child(2) { animation-delay: 0.2s; }
    .loader-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes loader-pulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
      40%            { transform: scale(1);   opacity: 1; }
    }
    .loader-label {
      font-family: var(--font-body);
      font-size: var(--fs-xs);
      letter-spacing: var(--ls-wider);
      color: var(--clr-text-3);
      text-transform: uppercase;
    }

    /* ── Error State ───────────────────────────────────────────── */
    #error-state {
      display: none;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      text-align: center;
      padding: var(--sp-8);
    }
    #error-state.visible { display: flex; }
    .error-code {
      font-family: var(--font-display);
      font-size: var(--fs-4xl);
      font-weight: 800;
      color: var(--clr-border-dim);
      line-height: 1;
    }
    .error-msg { font-size: var(--fs-base); color: var(--clr-text-2); }
    .error-link { color: var(--clr-accent); font-size: var(--fs-sm); }
    .error-link:hover { text-decoration: underline; }

    /* ── Main Layout ───────────────────────────────────────────── */
    #portfolio-page { display: none; }
    #portfolio-page.visible { display: block; }

    /* ── NAV BAR ───────────────────────────────────────────────── */
    .p-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(8, 12, 10, 0.85);
      backdrop-filter: blur(12px) saturate(1.5);
      -webkit-backdrop-filter: blur(12px) saturate(1.5);
      border-bottom: 1px solid var(--clr-border-dim);
      padding: 0 clamp(20px, 5vw, 60px);
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .p-nav-logo {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: var(--fs-base);
      letter-spacing: var(--ls-wide);
      color: var(--clr-text);
      text-decoration: none;
    }
    .p-nav-logo span { color: var(--clr-accent); }
    .p-nav-actions { display: flex; align-items: center; gap: var(--sp-3); }
    .p-nav-github {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: var(--fs-sm);
      letter-spacing: var(--ls-wide);
      color: var(--clr-text-2);
      text-decoration: none;
      padding: 6px 12px;
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-md);
      transition: all var(--dur-base) var(--ease-out);
    }
    .p-nav-github:hover {
      border-color: var(--clr-accent);
      color: var(--clr-accent);
      background: var(--clr-accent-dim);
    }
    .p-nav-github svg { width: 14px; height: 14px; }

    /* ── PORTFOLIO CONTAINER — mirrors edit.html ────────────────── */
    .portfolio-container {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 var(--sp-6) var(--sp-32);
    }

    /* ── HERO — identical classes to edit.html ─────────────────── */
    .portfolio-hero {
      padding: var(--sp-20) 0 var(--sp-16);
      position: relative;
    }
    .portfolio-hero::after {
      content: ''; position: absolute;
      bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, var(--clr-accent), transparent);
      opacity: 0.2;
    }

    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: var(--sp-2);
      font-size: var(--fs-xs); font-weight: 500;
      letter-spacing: var(--ls-wider); text-transform: uppercase;
      color: var(--clr-accent); margin-bottom: var(--sp-5); opacity: 0.8;
    }
    .hero-eyebrow::before {
      content: ''; width: 24px; height: 1px; background: var(--clr-accent);
    }

    .portfolio-hero__name {
      font-family: var(--font-display);
      font-size: clamp(3rem, 8vw, 6.5rem);
      font-weight: 800; letter-spacing: var(--ls-tight);
      line-height: 0.95; margin-bottom: var(--sp-5);
      color: var(--clr-text);
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.7s var(--ease-out), transform 0.7s var(--ease-out);
    }
    .portfolio-hero__name.revealed { opacity: 1; transform: translateY(0); }

    .portfolio-hero__title {
      font-family: var(--font-body); font-size: var(--fs-lg);
      color: var(--clr-accent); letter-spacing: var(--ls-wide);
      margin-bottom: var(--sp-8); opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.5s ease 0.3s, transform 0.5s ease 0.3s;
    }
    .portfolio-hero__title.revealed { opacity: 0.9; transform: translateY(0); }

    .portfolio-hero__bio {
      font-family: var(--font-serif); font-style: italic;
      font-size: clamp(1rem, 2vw, 1.2rem); font-weight: 300;
      color: var(--clr-text-2); line-height: var(--lh-loose);
      max-width: 640px; margin-bottom: var(--sp-10);
      opacity: 0; transform: translateY(12px);
      transition: opacity 0.5s ease 0.45s, transform 0.5s ease 0.45s;
    }
    .portfolio-hero__bio.revealed { opacity: 1; transform: translateY(0); }

    .hero-links {
      display: flex; flex-wrap: wrap; align-items: center; gap: var(--sp-3);
      opacity: 0; transform: translateY(12px);
      transition: opacity 0.5s ease 0.6s, transform 0.5s ease 0.6s;
    }
    .hero-links.revealed { opacity: 1; transform: translateY(0); }

    .hero-link {
      display: inline-flex; align-items: center; gap: var(--sp-2);
      font-size: var(--fs-sm); color: var(--clr-text-3);
      letter-spacing: var(--ls-wide); text-transform: uppercase;
      text-decoration: none;
      padding: 8px 14px;
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-md);
      transition: all var(--dur-base) var(--ease-out);
    }
    .hero-link:hover {
      border-color: var(--clr-accent);
      color: var(--clr-accent);
      background: var(--clr-accent-dim);
    }
    .hero-link svg { width: 14px; height: 14px; }



    /* ── SECTIONS — identical class names to edit.html ─────────── */
    .portfolio-section { padding: var(--sp-16) 0 0; }

    .section-label {
      display: flex; align-items: center; gap: var(--sp-4);
      font-size: var(--fs-xs); font-weight: 500;
      letter-spacing: var(--ls-wider); text-transform: uppercase;
      color: var(--clr-text-3); margin-bottom: var(--sp-8);
    }
    .section-label::after {
      content: ''; flex: 1; height: 1px; background: var(--clr-border-dim);
    }
    .section-label span {
      color: var(--clr-accent); font-family: var(--font-display);
      font-weight: 700; font-size: var(--fs-sm); letter-spacing: normal;
    }

    /* ── SKILLS — identical class names to edit.html ───────────── */
    .skills-container { display: flex; flex-wrap: wrap; gap: var(--sp-2); }

    /* skill-tag class = same as edit.html (rendered by JS) */
    .skill-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.3rem 0.75rem;
      border-radius: 999px;
      font-size: var(--fs-sm);
      font-family: var(--font-body);
      background: var(--clr-accent-dim);
      border: 1px solid rgba(0, 255, 136, 0.2);
      color: var(--clr-text);
      white-space: nowrap;
      opacity: 0; transform: translateY(8px) scale(0.95);
      transition: opacity 0.4s ease, transform 0.4s ease,
                  border-color var(--dur-base), background var(--dur-base);
    }
    .skill-tag.revealed { opacity: 1; transform: translateY(0) scale(1); }
    .skill-tag:hover {
      border-color: rgba(0, 255, 136, 0.4);
      background: rgba(0, 255, 136, 0.1);
    }
    /* sub-span used by portfolio.js's _renderSkillTags */
    .skill-tag__text { pointer-events: none; }

    /* ── PROJECTS — identical class names to edit.html ─────────── */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: var(--sp-5);
    }

    /* project-card — identical classes used by portfolio.js */
    .project-card {
      background: var(--clr-bg-3);
      border: 1px solid var(--clr-border-dim);
      border-radius: var(--radius-lg);
      padding: var(--sp-6);
      display: flex; flex-direction: column; gap: var(--sp-3);
      transition: border-color var(--dur-base) var(--ease-out),
                  box-shadow var(--dur-base) var(--ease-out),
                  transform var(--dur-base) var(--ease-out);
      position: relative; overflow: hidden;
    }
    /*
     * Free themes (dark/light/minimal): cards start hidden, .revealed shows them.
     * Pro themes (noir/blueprint/cyberpunk/…): their JS injects a higher-specificity
     * [data-theme="X"] .project-card rule that handles reveal via their own classes
     * (.nr-revealed / .bp-revealed / .cb-revealed etc.). We must NOT set opacity:0
     * here because that would conflict. Instead, free-theme reveal is opt-in via
     * .portfolio-page--free-reveal class set in applyTheme() for free themes only.
     */
    .portfolio-page--free-reveal .project-card {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.5s ease, transform 0.5s var(--ease-out),
                  border-color var(--dur-base) var(--ease-out),
                  box-shadow var(--dur-base) var(--ease-out);
    }
    .portfolio-page--free-reveal .project-card.revealed { opacity: 1; transform: translateY(0); }
    .project-card::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--clr-accent), transparent);
      opacity: 0; transition: opacity var(--dur-base);
    }
    .project-card:hover {
      border-color: var(--clr-border);
      box-shadow: var(--shadow-md);
      transform: translateY(-3px);
    }
    .project-card:hover::before { opacity: 0.5; }

    .project-card--featured {
      border-color: rgba(0,255,136,0.15);
      background: linear-gradient(135deg, var(--clr-bg-3), var(--clr-surface));
    }
    .project-card--featured::before { opacity: 0.5; }

    .project-card__header {
      display: flex; align-items: center;
      justify-content: space-between; min-height: 28px;
    }
    .project-card__meta { display: flex; align-items: center; gap: var(--sp-2); }
    .lang-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .project-card__lang { font-size: var(--fs-xs); color: var(--clr-text-3); }

    .featured-badge {
      font-size: var(--fs-xs); font-weight: 600;
      letter-spacing: var(--ls-wide); text-transform: uppercase;
      color: var(--clr-accent); border: 1px solid rgba(0,255,136,0.3);
      border-radius: var(--radius-sm); padding: 2px 8px;
    }

    /* actions hidden in public view (no edit controls) */
    .project-card__actions { display: none; }

    .project-card__name {
      font-family: var(--font-display); font-weight: 700;
      font-size: var(--fs-lg); letter-spacing: var(--ls-tight);
      color: var(--clr-text); line-height: var(--lh-snug);
    }
    .project-card__desc {
      font-size: var(--fs-sm); color: var(--clr-text-2);
      line-height: var(--lh-loose); flex: 1;
    }
    .project-card__footer {
      display: flex; align-items: center; flex-wrap: wrap; gap: var(--sp-2);
      padding-top: var(--sp-3);
      border-top: 1px solid var(--clr-border-dim); margin-top: auto;
    }
    .project-stat { font-size: var(--fs-xs); color: var(--clr-text-3); }
    .topic-chip {
      font-size: var(--fs-xs); padding: 2px 8px;
      border-radius: var(--radius-full);
      background: var(--clr-accent-dim); color: var(--clr-accent);
      border: 1px solid rgba(0,255,136,0.15);
    }

    /* Project image (Feature 3) — mirrors edit.html's _buildProjectImageBlock */
    .project-card__img {
      width: 100%; max-height: 200px; object-fit: cover;
      border-radius: var(--radius-md);
      border: 1px solid var(--clr-border-dim);
      display: block; margin-bottom: var(--sp-2);
    }

    /* ── CUSTOM SECTIONS (Feature 2) ──────────────────────────── */
    .p-custom-section-content {
      font-size: var(--fs-sm);
      color: var(--clr-text-2);
      line-height: var(--lh-loose);
      white-space: pre-wrap;
      max-width: 680px;
    }

    /* ── FOOTER ────────────────────────────────────────────────── */
    .p-footer {
      border-top: 1px solid var(--clr-border-dim);
      padding: var(--sp-8) 0;
      margin-top: var(--sp-16);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--sp-4);
      flex-wrap: wrap;
    }
    .p-footer-left { font-size: var(--fs-sm); color: var(--clr-text-3); }
    .p-footer-cta {
      display: inline-flex; align-items: center; gap: var(--sp-2);
      font-size: var(--fs-sm); letter-spacing: var(--ls-wide);
      text-decoration: none; color: var(--clr-text-2);
      border: 1px solid var(--clr-border);
      padding: 8px 16px; border-radius: var(--radius-md);
      transition: all var(--dur-base) var(--ease-out);
    }
    .p-footer-cta:hover {
      border-color: var(--clr-accent);
      color: var(--clr-accent);
      background: var(--clr-accent-dim);
    }

    /* ── Scroll reveal ─────────────────────────────────────────── */
    .p-reveal-section {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.6s ease, transform 0.6s var(--ease-out);
    }
    .p-reveal-section.in-view { opacity: 1; transform: translateY(0); }

    /* ── Language Colors ───────────────────────────────────────── */
    .lang-javascript  { background: #F7DF1E; }
    .lang-typescript  { background: #3178C6; }
    .lang-python      { background: #3572A5; }
    .lang-rust        { background: #DEA584; }
    .lang-go          { background: #00ADD8; }
    .lang-java        { background: #B07219; }
    .lang-css         { background: #563D7C; }
    .lang-html        { background: #E34C26; }
    .lang-ruby        { background: #701516; }
    .lang-swift       { background: #F05138; }
    .lang-kotlin      { background: #7F52FF; }
    .lang-cpp         { background: #F34B7D; }
    .lang-c           { background: #555555; }
    .lang-shell       { background: #89E051; }
    .lang-php         { background: #4F5D95; }
    .lang-dart        { background: #00B4AB; }
    .lang-vue         { background: #41B883; }
    .lang-svelte      { background: #FF3E00; }

    /* ── Responsive ────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .portfolio-container { padding: 0 var(--sp-4) var(--sp-20); }
      .projects-grid { grid-template-columns: 1fr; }
      .portfolio-hero__name { font-size: clamp(2.5rem, 12vw, 4rem); }
    }
  </style>
</head>

  <!-- PORTFOLIO PAGE -->
  <div id="portfolio-page" aria-hidden="true">

    <!-- PORTFOLIO CONTENT — uses same structure as edit.html -->

      <!-- HERO -->
      <header class="portfolio-hero" id="portfolio-hero" aria-label="Developer profile">

        <!-- Avatar -->
        <div class="hero-avatar-wrap" id="hero-avatar-wrap">
          <div class="hero-avatar-placeholder" id="hero-avatar-placeholder" aria-hidden="true"></div>

    /* ── Language color map — mirrors portfolio.js ──────────────── */
    const LANG_COLORS = {
      JavaScript: '#f1e05a', TypeScript: '#3178c6', Python: '#3572A5',
      Java: '#b07219', Rust: '#dea584', Go: '#00ADD8', Ruby: '#701516',
      PHP: '#4F5D95', C: '#555555', 'C++': '#f34b7d', 'C#': '#178600',

      HTML: '#e34c26', CSS: '#563d7c', Shell: '#89e051',
      Vue: '#41b883', Svelte: '#ff3e00',
    };
    function getLangColor(lang) {
      if (!lang) return '#6b7280';
      // try exact, then case-insensitive
      return LANG_COLORS[lang]
        || LANG_COLORS[lang.charAt(0).toUpperCase() + lang.slice(1).toLowerCase()]
        || '#6b7280';
    }

    /* ── Helpers ──────────────────────────────────────────────────── */
    function fmtNum(n) {
      if (typeof n !== 'number' || isNaN(n)) return '0';
      if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
      return String(n);
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = String(str || '');
      return d.innerHTML;

    /* ── Scroll reveal ──────────────────────────────────────────── */
    /* ── Pro reveal themes — declared early for staggerReveal & applyTheme ── */
    const PRO_REVEAL_THEMES = new Set([
      'noir', 'blueprint', 'cyberpunk',
      'editorial', 'terminal', 'liquid', 'glass3d', 'space'
    ]);

        function initScrollReveal() {
      const els = document.querySelectorAll('.p-reveal-section');
      const io = new IntersectionObserver((entries) => {
        entries.forEach((e) => {
          if (e.isIntersecting) {
            e.target.classList.add('in-view');
            io.unobserve(e.target);
          }
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
      els.forEach((el) => io.observe(el));
    }

    function staggerReveal(children, baseDelay = 0, step = 80) {
      // Pro themes manage their own reveal — adding .revealed would conflict
      // because [data-theme="X"] .project-card has higher specificity and expects
      // .nr-revealed / .bp-revealed / .cb-revealed (added by their JS init()).
      const activeTheme = document.documentElement.getAttribute('data-theme') || '';
      const isProReveal = PRO_REVEAL_THEMES.has(activeTheme);

      children.forEach((el, i) => {
        const isCard = el.classList.contains('project-card');
        if (isCard && isProReveal) return; // Pro theme's init() will reveal cards
        setTimeout(() => el.classList.add('revealed'), baseDelay + i * step);
      });
    }

    /* ── Load GitHub avatar ────────────────────────────────────── */
    function loadAvatar(githubUsername, fullName) {
      const wrap        = document.getElementById('hero-avatar-wrap');

        .map(w => w[0]?.toUpperCase() || '').join('');

        const avatarUrl = `https://avatars.githubusercontent.com/${encodeURIComponent(githubUsername)}?v=4&s=360`;
        img.onload = () => {
          img.style.display = 'block';
          if (placeholder) placeholder.style.display = 'none';
        };
        img.onerror = () => {
          // Keep initials placeholder — no broken image
        };
        img.src = avatarUrl;

      // Animate in regardless of image load status
      setTimeout(() => wrap?.classList.add('revealed'), 80);

    /* ── GitHub URL normalizer ─────────────────────────────────────
     * Converts github.com/user/repo/blob/branch/path.png
     * to raw.githubusercontent.com/user/repo/branch/path.png
     * so <img> can load the actual image binary.
     ─────────────────────────────────────────────────────────── */
    function toRawGithubUrl(url) {
      if (!url) return url;
      url = url.trim();
      if (url.includes('raw.githubusercontent.com')) return url;
      const match = url.match(
        /^https?:\/\/github\.com\/([^/]+)\/([^/]+)\/(blob|raw)\/(.+)$/
      );
      if (match) {
        const [, user, repo, , rest] = match;
        return `https://raw.githubusercontent.com/${user}/${repo}/${rest}`;
      }
      return url;
    }

          <h3 class="project-card__name">${esc(name)}</h3>

          <div class="project-card__footer">

            ${topics.slice(0, 3).map(t => `<span class="topic-chip">${esc(t)}</span>`).join('')}
          </div>
        `;

        grid.appendChild(card);

      const cards = grid.querySelectorAll('.project-card');
      setTimeout(() => staggerReveal([...cards], 200, 100), 200);

    /* ── Themes that manage their own card reveal via injected JS ───
     * These themes inject [data-theme="X"] .project-card { opacity:0 / clip-path }
     * with higher specificity AND reveal cards via their own classes
     * (.nr-revealed, .bp-revealed, .cb-revealed …) inside init().
     * We must NOT run our staggerReveal() for these — it adds .revealed which
     * is the wrong class and cards would stay invisible forever.
     * Free themes (dark/light/minimal) use .portfolio-page--free-reveal instead.
     ─────────────────────────────────────────────────────────────── */
    /* ── Apply theme — identical logic to edit.html / portfolio.js ── */
    function applyTheme(theme) {
      // 1. Load CSS file via #active-theme-css (same id as edit.html)
      const link = document.getElementById('active-theme-css');
      if (link) link.href = `css/themes/${theme}.css`;

      // 2. Set data-theme attributes (same as edit.html)
      document.documentElement.setAttribute('data-theme', theme);
      document.body.setAttribute('data-theme', theme);
      document.body.className = document.body.className.replace(/\btheme-\S+/g, '').trim();
      document.body.classList.add(`theme-${theme}`);

      // 3. Free themes: enable simple opacity reveal flow.
      //    Pro themes: their JS init() handles card reveal — skip ours.
      const page = document.getElementById('portfolio-page');
      if (page) {
        if (PRO_REVEAL_THEMES.has(theme)) {
          page.classList.remove('portfolio-page--free-reveal');
        } else {
          page.classList.add('portfolio-page--free-reveal');
        }
      }
    }

    /* ── Supabase client singleton ──────────────────────────────── */
    let _sb = null;
    function getSupabaseClient() {
      if (_sb) return _sb;
      if (!window.SUPABASE_URL || !window.SUPABASE_ANON_KEY) return null;
      if (!window.supabase?.createClient) return null;
      _sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
      window._supabaseClient = _sb;
      return _sb;
    }

    /* ── Load portfolio from Supabase by slug ───────────────────── */
    async function loadFromSupabase(slug) {
      try {
        const sb = getSupabaseClient();
        if (!sb) return null;

        const { data: portfolio, error } = await sb
          .from('portfolios')
          .select(`
            id, bio, skills, theme, slug, is_published,
            user_id, linkedin_url, gmail_address, custom_sections,
            projects ( github_repo_name, ai_description, stars, language, topics, sort_order, repo_url, is_featured, image_url ),
            users ( full_name, github_username, job_title )
          `)
          .eq('slug', slug)
          .eq('is_published', true)
          .single();

        if (error || !portfolio) return null;

        // userData comes from the embedded FK join — avoids a separate query
        // on the users table which may be blocked by RLS for anonymous visitors.
        // Supabase returns the joined row as an object (not array) when using FK join.
        // If the join key name differs, portfolio.users may be an array — handle both.
        const _u = portfolio.users;
        const userData = Array.isArray(_u) ? (_u[0] || null) : (_u || null);

        const projects = (portfolio.projects || [])
          .sort((a, b) => a.sort_order - b.sort_order)
          .map(p => ({
            github_repo_name: p.github_repo_name,
            repo_name:        p.github_repo_name,
            ai_description:   p.ai_description,
            stars:            p.stars || 0,
            language:         p.language,
            topics:           p.topics || [],
            repo_url:         p.repo_url || `https://github.com/${userData?.github_username}/${p.github_repo_name}`,
            imageUrl:         toRawGithubUrl(p.image_url || null),
          }));

        // GitHub user data with cache
        let githubUser = { public_repos: projects.length, followers: 0, languages: {} };
        if (userData?.github_username) {
          const cacheKey = `gh_user_${userData.github_username}`;
          const cached = sessionStorage.getItem(cacheKey);
          if (cached) {
            try { githubUser = JSON.parse(cached); } catch {}
          } else {
            try {
              const ghRes = await fetch(
                `https://api.github.com/users/${encodeURIComponent(userData.github_username)}`,
                { headers: { 'Accept': 'application/vnd.github.v3+json' } }
              );
              if (ghRes.ok) {
                const ghData = await ghRes.json();
                githubUser = {
                  public_repos: ghData.public_repos || projects.length,
                  followers:    ghData.followers    || 0,
                  languages:    {},
                };
                try { sessionStorage.setItem(cacheKey, JSON.stringify(githubUser)); } catch {}
              }
            } catch {}
          }
        }

        return {
          bio:             portfolio.bio,
          skills:          portfolio.skills || [],
          projects,
          fullName:        userData?.full_name || userData?.github_username || '',
          name:            userData?.full_name || userData?.github_username || '',
          jobTitle:        userData?.job_title || 'Software Developer',
          githubUsername:  userData?.github_username || '',
          theme:           portfolio.theme || 'dark',
          githubUser,
          githubRepos:     projects,
          linkedinUrl:     portfolio.linkedin_url  || '',
          gmailAddress:    portfolio.gmail_address || '',
          custom_sections: portfolio.custom_sections || [],
        };
      } catch (err) {
        console.error('[portfolio.html] Supabase load error:', err);
        return null;
      }
    }

    /* ── Init ────────────────────────────────────────────────────── */
    async function init() {
      const urlParams = new URLSearchParams(window.location.search);
      const slugParam = urlParams.get('slug') || urlParams.get('u');
      const pathSlug  = window.location.pathname.match(/\/p\/([^/?#]+)/)?.[1];
      const slug      = slugParam || pathSlug || null;

      let draft = null;

      if (slug) {
        // Public mode — load from Supabase
        draft = await loadFromSupabase(slug);
        if (!draft) {
          showError(`Portfolio "${slug}" not found or not published.`);
          return;
        }
      } else {
        // Preview mode — load from sessionStorage (same as edit.html flow)
        if (window.AI?.getDraft) {
          draft = window.AI.getDraft();
        } else {
          try {
            const raw = sessionStorage.getItem('pg_portfolio_draft');
            if (raw) draft = JSON.parse(raw);
          } catch {}
        }
        // Brief UX delay only in preview mode
        await new Promise(r => setTimeout(r, 600));
      }

      if (!draft) {
        showError('Portfolio not found. Please generate one first.');
        return;
      }

      // ── Apply theme (identical flow to edit.html) ──────────────
      const theme = draft.theme || 'dark';
      applyTheme(theme);

      // ── Render content BEFORE loading Pro theme JS ─────────────
      try {
        renderPortfolio(draft);
      } catch (err) {
        console.error('[portfolio.html] Render error:', err);
        showError('Something went wrong rendering the portfolio.');
        return;
      }

      // ── Load Pro theme JS AFTER render ─────────────────────────
      if (PRO_THEME_SCRIPTS[theme]) {
        loadProThemeScript(theme);
      }

      // ── Show page ───────────────────────────────────────────────
      document.getElementById('page-loader')?.classList.add('hidden');
      const page = document.getElementById('portfolio-page');
      if (page) {
        page.classList.add('visible');
        page.removeAttribute('aria-hidden');
      }

      // ── Animate ─────────────────────────────────────────────────
      requestAnimationFrame(() => {
        animateHero();
        initScrollReveal();
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }

  })();
  </script>

</body>
</html>
